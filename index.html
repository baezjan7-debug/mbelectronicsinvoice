<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MB Electronics — Invoice Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --navy:   #0a0f1e;
      --navy2:  #0d1b2a;
      --mid:    #1e2d42;
      --blue:   #1e90ff;
      --blue2:  #0a6fd8;
      --cyan:   #00d4ff;
      --white:  #f0f6ff;
      --gray:   #4a5568;
      --border: rgba(30,144,255,0.28);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
    }
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(30,144,255,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,144,255,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events:none; z-index:0;
    }
    .app { position:relative; z-index:1; max-width:640px; margin:0 auto; padding-bottom:60px; }

    /* HEADER */
    .header {
      background:#0a0f1e;
      border-bottom:3px solid var(--blue);
      padding:16px 20px;
      display:flex; align-items:center; gap:14px;
    }
    .logo-box {
      width:52px; height:52px;
      border:1.5px solid var(--blue); border-radius:10px;
      background:var(--mid);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      box-shadow:0 0 16px rgba(30,144,255,.3); flex-shrink:0;
    }
    .logo-mb  { color:var(--blue); font-weight:700; font-size:18px; line-height:1; }
    .logo-sub { color:var(--blue); font-size:6px; letter-spacing:1px; }
    .header-title { font-family:'Rajdhani',sans-serif; font-size:20px; font-weight:700; letter-spacing:2px; }
    .header-sub   { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--blue); letter-spacing:2px; }

    /* BODY & CARD */
    .body { padding:24px 16px; }
    .card {
      background:var(--navy2);
      border:1px solid var(--border);
      border-radius:14px;
      padding:20px 16px;
      margin-bottom:20px;
    }

    /* MIC */
    .mic-label {
      text-align:center;
      font-family:'Share Tech Mono',monospace;
      font-size:11px; letter-spacing:4px; color:var(--blue);
      margin-bottom:20px;
    }
    .mic-btn {
      width:100px; height:100px; border-radius:50%;
      border:2px solid var(--blue); background:var(--mid);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; margin:0 auto 14px;
      box-shadow:0 0 30px rgba(30,144,255,.2);
      transition:all .2s; font-size:36px;
    }
    .mic-btn.recording {
      border-color:#ff4444; background:#1a0a0a;
      animation:pulse-red 1.2s infinite;
    }
    @keyframes pulse-red {
      0%  { box-shadow:0 0 0 0   rgba(255,68,68,.6); }
      70% { box-shadow:0 0 0 20px rgba(255,68,68,0); }
      100%{ box-shadow:0 0 0 0   rgba(255,68,68,0); }
    }
    .status-txt {
      text-align:center;
      font-family:'Share Tech Mono',monospace;
      font-size:12px; color:var(--gray); letter-spacing:1px; min-height:18px;
    }
    .status-txt.active { color:#ff6666; }

    /* TRANSCRIPT */
    .transcript {
      background:#0a0f1e;
      border:1px solid rgba(0,212,255,.3);
      border-radius:10px; padding:12px 14px;
      font-family:'Share Tech Mono',monospace;
      font-size:13px; line-height:1.6; margin-top:16px; min-height:60px;
    }
    .t-final   { color:var(--cyan); }
    .t-interim { color:rgba(0,212,255,.4); font-style:italic; }

    /* BUTTONS */
    .process-btn {
      width:100%; padding:14px; margin-top:14px;
      background:linear-gradient(135deg,var(--blue2),var(--blue));
      border:none; border-radius:10px;
      color:#fff; font-size:16px; font-weight:700; letter-spacing:2px;
      cursor:pointer; transition:all .2s;
    }
    .process-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(30,144,255,.35); }
    .mic-hint {
      text-align:center; font-size:11px; color:var(--gray);
      margin-top:10px; font-family:'Share Tech Mono',monospace; letter-spacing:1px;
    }
    .manual-link-wrap { text-align:center; margin-top:16px; }
    .manual-link {
      background:transparent; border:none;
      color:var(--gray); font-family:'Share Tech Mono',monospace;
      font-size:11px; cursor:pointer; letter-spacing:2px; text-decoration:underline;
    }
    .back-btn {
      background:transparent;
      border:1px solid var(--border);
      border-radius:8px; color:var(--blue);
      padding:8px 16px; font-family:'Share Tech Mono',monospace;
      font-size:11px; cursor:pointer; margin-bottom:16px; letter-spacing:2px;
    }
    .section-title {
      font-family:'Share Tech Mono',monospace;
      font-size:11px; letter-spacing:3px; color:var(--blue);
      text-transform:uppercase; margin-bottom:14px;
      padding-bottom:8px; border-bottom:1px solid var(--border);
    }
    .field-label {
      display:block; font-family:'Share Tech Mono',monospace;
      font-size:10px; letter-spacing:2px; color:var(--blue);
      text-transform:uppercase; margin-bottom:5px;
    }
    .field-input {
      width:100%; background:var(--mid);
      border:1px solid var(--border); border-radius:8px;
      padding:10px 12px; color:var(--white); font-size:14px;
      outline:none; margin-bottom:12px; transition:border-color .2s;
      font-family:'Exo 2',sans-serif;
    }
    .field-input:focus { border-color:var(--blue); box-shadow:0 0 0 2px rgba(30,144,255,.15); }
    .field-input::placeholder { color:var(--gray); }

    /* SERVICES */
    .svc-headers {
      display:grid; grid-template-columns:1fr 60px 90px 36px;
      gap:8px; margin-bottom:6px;
    }
    .svc-headers span {
      font-family:'Share Tech Mono',monospace; font-size:9px;
      letter-spacing:2px; color:var(--blue); text-transform:uppercase; padding-left:4px;
    }
    .svc-row { display:grid; grid-template-columns:1fr 60px 90px 36px; gap:8px; margin-bottom:8px; }
    .svc-input {
      background:var(--mid); border:1px solid var(--border);
      border-radius:8px; padding:10px 8px;
      color:var(--white); font-size:13px; outline:none; width:100%;
      font-family:'Exo 2',sans-serif;
    }
    .svc-input:focus { border-color:var(--blue); }
    .svc-input::placeholder { color:var(--gray); }
    .rm-btn {
      background:rgba(255,68,68,.1); border:1px solid rgba(255,68,68,.3);
      border-radius:8px; color:#ff6666; cursor:pointer;
      font-size:20px; height:40px; width:36px;
      display:flex; align-items:center; justify-content:center;
    }
    .add-btn {
      width:100%; padding:10px; background:transparent;
      border:1px dashed var(--border); border-radius:8px;
      color:var(--blue); font-family:'Share Tech Mono',monospace;
      font-size:11px; letter-spacing:2px; cursor:pointer; margin-bottom:16px;
    }
    .total-bar {
      display:flex; justify-content:space-between; align-items:center;
      background:var(--mid); border-radius:10px;
      padding:14px 16px; margin-bottom:20px;
      border:1px solid var(--border);
    }
    .total-label { font-family:'Share Tech Mono',monospace; font-size:12px; letter-spacing:2px; color:var(--gray); }
    .total-val   { font-size:28px; font-weight:700; color:var(--blue); }
    .gen-btn {
      width:100%; padding:16px;
      background:linear-gradient(135deg,var(--blue2),var(--blue));
      border:none; border-radius:10px;
      color:#fff; font-size:18px; font-weight:700; letter-spacing:2px;
      cursor:pointer; box-shadow:0 4px 20px rgba(30,144,255,.3); transition:all .2s;
    }
    .gen-btn:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(30,144,255,.4); }

    /* LOADER */
    .loader {
      display:none; position:fixed; inset:0;
      background:rgba(10,15,30,.9);
      flex-direction:column; align-items:center; justify-content:center;
      gap:16px; z-index:999;
    }
    .loader.show { display:flex; }
    .spinner {
      width:48px; height:48px;
      border:3px solid rgba(30,144,255,.2);
      border-top:3px solid var(--blue);
      border-radius:50%; animation:spin .8s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loader-text { font-family:'Share Tech Mono',monospace; font-size:12px; color:var(--cyan); letter-spacing:3px; }

    /* ERROR */
    .ai-error {
      background:rgba(255,68,68,.1); border:1px solid rgba(255,68,68,.4);
      border-radius:10px; padding:12px 14px; color:#ff8080;
      font-size:12px; margin-top:14px;
      font-family:'Share Tech Mono',monospace; line-height:1.5;
    }

    @media (max-width:480px) {
      .svc-row, .svc-headers { grid-template-columns:1fr 55px 80px 36px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-box">
      <span class="logo-mb">MB</span>
      <span class="logo-sub">ELECTRONICS</span>
    </div>
    <div>
      <div class="header-title">MB ELECTRONICS</div>
      <div class="header-sub">// Invoice Generator · AI Powered //</div>
    </div>
  </div>

  <div class="body">

    <!-- MIC SCREEN -->
    <div id="micScreen" class="card">
      <div class="mic-label">// HABLA PARA CREAR TU FACTURA //</div>
      <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
      <div class="status-txt" id="statusTxt">Toca el micrófono para hablar</div>
      <div class="transcript" id="transcript" style="display:none"></div>
      <div class="ai-error" id="aiError" style="display:none"></div>
      <button class="process-btn" id="processBtn" style="display:none" onclick="processVoice()">⚡ PROCESAR CON IA</button>
      <div class="mic-hint" id="micHint">Habla: nombre del cliente, servicio, precio...</div>
      <div class="manual-link-wrap">
        <button class="manual-link" onclick="showForm()">O LLENA EL FORMULARIO MANUALMENTE →</button>
      </div>
    </div>

    <!-- FORM SCREEN -->
    <div id="formScreen" style="display:none">
      <button class="back-btn" onclick="showMic()">← VOLVER AL MICRÓFONO</button>
      <div class="ai-error" id="formError" style="display:none"></div>

      <div class="card">
        <div class="section-title">// Cliente</div>
        <label class="field-label">Nombre / Empresa</label>
        <input class="field-input" id="clientName" placeholder="Optometry World Gurabo"/>
        <label class="field-label">Contacto</label>
        <input class="field-input" id="clientContact" placeholder="Moraima Rivera"/>
        <label class="field-label">Email</label>
        <input class="field-input" id="clientEmail" placeholder="cliente@email.com"/>
        <label class="field-label">Teléfono</label>
        <input class="field-input" id="clientPhone" placeholder="(787) 000-0000"/>
        <label class="field-label">Dirección</label>
        <input class="field-input" id="clientAddress" placeholder="Gurabo, Puerto Rico"/>
        <label class="field-label">Fecha</label>
        <input class="field-input" type="date" id="invoiceDate"/>
      </div>

      <div class="card">
        <div class="section-title">// Servicios</div>
        <div class="svc-headers">
          <span>Descripción</span><span>Cant.</span><span>Precio</span><span></span>
        </div>
        <div id="servicesContainer"></div>
        <button class="add-btn" onclick="addServiceRow()">+ AGREGAR SERVICIO</button>
        <div class="total-bar">
          <span class="total-label">TOTAL DUE</span>
          <span class="total-val" id="totalDisplay">$0.00</span>
        </div>
        <button class="gen-btn" onclick="generatePDF()">⬇ DESCARGAR FACTURA PDF</button>
      </div>
    </div>

  </div>
</div>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="spinner"></div>
  <span class="loader-text">PROCESANDO CON IA...</span>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
let recognition  = null;
let isRecording  = false;
let finalText    = "";
let silenceTimer = null;

let svcCount = 0;

// Set today's date
document.getElementById("invoiceDate").value = new Date().toISOString().split("T")[0];
addServiceRow();

// ── SCREEN SWITCHES ───────────────────────────────────────────────────────────
function showForm() {
  document.getElementById("micScreen").style.display  = "none";
  document.getElementById("formScreen").style.display = "block";
}
function showMic() {
  document.getElementById("formScreen").style.display = "none";
  document.getElementById("micScreen").style.display  = "block";
}

// ── MIC ───────────────────────────────────────────────────────────────────────
function toggleMic() {
  if (isRecording) stopMic(false);
  else startMic();
}

function armSilenceTimer() {
  clearTimeout(silenceTimer);
  silenceTimer = setTimeout(() => stopMic(true), 5000);
}

function startMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Usa Chrome o Edge para el micrófono."); return; }

  recognition = new SR();
  recognition.continuous     = true;
  recognition.interimResults = true;
  recognition.lang           = "es-US";
  finalText = "";

  recognition.onresult = (e) => {
    let fin = "", int = "";
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      if (e.results[i].isFinal) fin += t + " ";
      else int += t;
    }
    if (fin) finalText += fin;

    const box = document.getElementById("transcript");
    box.style.display = "block";
    box.innerHTML = `<span class="t-final">${finalText}</span><span class="t-interim">${int}</span>`;
    armSilenceTimer();
  };

  recognition.onerror = () => stopMic(false);
  recognition.onend   = () => { if (recognition) try { recognition.start(); } catch(e){} };

  recognition.start();
  isRecording = true;

  const btn = document.getElementById("micBtn");
  btn.classList.add("recording");
  btn.textContent = "⏹️";

  const st = document.getElementById("statusTxt");
  st.textContent = "🔴 Grabando... habla ahora";
  st.className   = "status-txt active";

  document.getElementById("processBtn").style.display = "none";
  document.getElementById("aiError").style.display    = "none";
  document.getElementById("micHint").textContent = "Para automáticamente después de 5 seg de silencio 🎙️";
  armSilenceTimer();
}

function stopMic(autoProcess) {
  clearTimeout(silenceTimer);
  if (recognition) {
    recognition.onend = null;
    recognition.stop();
    recognition = null;
  }
  isRecording = false;

  const btn = document.getElementById("micBtn");
  btn.classList.remove("recording");
  btn.textContent = "🎤";

  const st = document.getElementById("statusTxt");

  if (autoProcess && finalText.trim()) {
    st.textContent = "✅ Procesando con IA...";
    st.className   = "status-txt";
    setTimeout(() => processVoice(), 300);
  } else {
    st.textContent = "Listo — presiona PROCESAR o graba de nuevo.";
    st.className   = "status-txt";
    if (finalText.trim()) {
      document.getElementById("processBtn").style.display = "block";
    }
  }
  document.getElementById("micHint").textContent = "Habla: nombre del cliente, servicio, precio...";
}

// ── AI PROCESS ────────────────────────────────────────────────────────────────
async function processVoice() {
  const text = finalText.trim();
  if (!text) return;

  document.getElementById("loader").classList.add("show");
  document.getElementById("aiError").style.display = "none";
  document.getElementById("processBtn").style.display = "none";

  try {
    const res = await fetch("/api/parse-invoice", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    // Fill form
    document.getElementById("clientName").value    = data.clientName    || "";
    document.getElementById("clientContact").value = data.clientContact || "";
    document.getElementById("clientEmail").value   = data.clientEmail   || "";
    document.getElementById("clientPhone").value   = data.clientPhone   || "";
    document.getElementById("clientAddress").value = data.clientAddress || "";

    // Fill services
    if (data.services && data.services.length) {
      document.getElementById("servicesContainer").innerHTML = "";
      data.services.forEach(s => addServiceRow(s.desc, s.qty, s.price));
    }

    updateTotal();
    showForm();

  } catch(err) {
    const el = document.getElementById("aiError");
    el.style.display = "block";
    el.textContent   = "Error: " + err.message;
    document.getElementById("processBtn").style.display = "block";
  }

  document.getElementById("loader").classList.remove("show");
}

// ── SERVICES ──────────────────────────────────────────────────────────────────
function addServiceRow(desc="", qty=1, price="") {
  svcCount++;
  const id  = svcCount;
  const div = document.createElement("div");
  div.className = "svc-row";
  div.id        = "svc-" + id;
  div.innerHTML = `
    <input class="svc-input" placeholder="Descripción" value="${desc}" oninput="updateTotal()"/>
    <input class="svc-input" type="number" value="${qty}" min="1" oninput="updateTotal()"/>
    <input class="svc-input" type="number" placeholder="0.00" value="${price||""}" step="0.01" oninput="updateTotal()"/>
    <button class="rm-btn" onclick="document.getElementById('svc-${id}').remove(); updateTotal()">×</button>
  `;
  document.getElementById("servicesContainer").appendChild(div);
  updateTotal();
}

function updateTotal() {
  let total = 0;
  document.querySelectorAll(".svc-row").forEach(row => {
    const ins = row.querySelectorAll("input");
    total += (parseFloat(ins[1].value)||0) * (parseFloat(ins[2].value)||0);
  });
  document.getElementById("totalDisplay").textContent = "$" + total.toFixed(2);
}

// ── PDF GENERATION ────────────────────────────────────────────────────────────
function generatePDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:"portrait", unit:"pt", format:"letter" });

  const W = 612, H = 792;
  const navy  = [13,  27,  42];
  const blue  = [30, 144, 255];
  const white = [240,246,255];
  const gray  = [74,  85, 104];
  const lgray = [203,213,224];
  const altBg = [234,242,255];

  // ── HEADER BG
  doc.setFillColor(...navy);
  doc.rect(0, 0, W, 120, "F");
  doc.setFillColor(...blue);
  doc.rect(0, 120, W, 4, "F");
  doc.setFillColor(232,240,254);
  doc.rect(0, 0, 8, H, "F");
  doc.setFillColor(...blue);
  doc.rect(0, H-4, W, 4, "F");

  // ── LOGO BOX
  doc.setFillColor(30,45,66);
  doc.roundedRect(36, 22, 72, 72, 8, 8, "F");
  doc.setDrawColor(...blue); doc.setLineWidth(1.5);
  doc.roundedRect(36, 22, 72, 72, 8, 8, "S");
  doc.setTextColor(...blue);
  doc.setFont("helvetica","bold"); doc.setFontSize(22);
  doc.text("MB", 72, 55, {align:"center"});
  doc.setFontSize(7);
  doc.text("ELECTRONICS", 72, 68, {align:"center"});

  // ── COMPANY NAME
  doc.setTextColor(...white);
  doc.setFontSize(22); doc.setFont("helvetica","bold");
  doc.text("MB Electronics", 124, 50);
  doc.setTextColor(126,200,255); doc.setFont("helvetica","normal"); doc.setFontSize(9);
  doc.text("Midean141@gmail.com  ·  (939) 579-1277", 124, 66);

  // ── INVOICE META
  const dateVal = document.getElementById("invoiceDate").value;
  const d       = dateVal ? new Date(dateVal+"T12:00:00") : new Date();
  const dateStr = d.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const invNum  = `INV-${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}-001`;

  doc.setTextColor(126,200,255); doc.setFontSize(8);
  doc.text("INVOICE", W-36, 35, {align:"right"});
  doc.setTextColor(...white); doc.setFont("helvetica","bold"); doc.setFontSize(13);
  doc.text(invNum, W-36, 52, {align:"right"});
  doc.setFont("helvetica","normal"); doc.setTextColor(126,200,255); doc.setFontSize(9);
  doc.text(dateStr, W-36, 68, {align:"right"});

  // ── BILL TO
  let y = 148;
  doc.setTextColor(...blue); doc.setFont("helvetica","bold"); doc.setFontSize(8);
  doc.text("BILL TO", 36, y);
  y += 14;

  const cName    = document.getElementById("clientName").value    || "—";
  const contact  = document.getElementById("clientContact").value;
  const email    = document.getElementById("clientEmail").value;
  const phone    = document.getElementById("clientPhone").value;
  const address  = document.getElementById("clientAddress").value;

  doc.setTextColor(...navy); doc.setFont("helvetica","bold"); doc.setFontSize(14);
  doc.text(cName, 36, y); y += 16;
  doc.setFont("helvetica","normal"); doc.setFontSize(10); doc.setTextColor(...gray);
  if (contact) { doc.text("Attn: "+contact, 36, y); y+=14; }
  if (email)   { doc.text(email,   36, y); y+=14; }
  if (phone)   { doc.text(phone,   36, y); y+=14; }
  if (address) { doc.text(address, 36, y); }

  // ── TOTAL (right side)
  const totalTxt = document.getElementById("totalDisplay").textContent;
  doc.setTextColor(...blue); doc.setFont("helvetica","bold"); doc.setFontSize(8);
  doc.text("PAYMENT DUE", W-36, 148, {align:"right"});
  doc.setTextColor(...navy); doc.setFontSize(13);
  doc.text("Upon Receipt", W-36, 163, {align:"right"});
  doc.setTextColor(...blue); doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.text("Total Amount", W-36, 188, {align:"right"});
  doc.setFont("helvetica","bold"); doc.setFontSize(26);
  doc.text(totalTxt, W-36, 210, {align:"right"});

  // ── DIVIDER
  y = 232;
  doc.setDrawColor(...blue); doc.setLineWidth(2);
  doc.line(36, y, W-36, y); y += 14;

  // ── TABLE HEADER
  doc.setFillColor(...navy);
  doc.rect(36, y, W-72, 28, "F");
  doc.setDrawColor(...blue); doc.setLineWidth(2.5);
  doc.line(36, y+28, W-36, y+28);
  doc.setTextColor(...white); doc.setFont("helvetica","bold"); doc.setFontSize(8);
  doc.text("DESCRIPTION", 46, y+18);
  doc.text("QTY",    400, y+18, {align:"center"});
  doc.text("RATE",   480, y+18, {align:"right"});
  doc.text("AMOUNT", W-46, y+18, {align:"right"});
  y += 28;

  // ── SERVICE ROWS
  let subtotal = 0;
  document.querySelectorAll(".svc-row").forEach((row, idx) => {
    const ins   = row.querySelectorAll("input");
    const desc  = ins[0].value || "Servicio";
    const qty   = parseFloat(ins[1].value) || 1;
    const price = parseFloat(ins[2].value) || 0;
    const amt   = qty * price;
    subtotal   += amt;

    doc.setFillColor(...(idx%2===0 ? [255,255,255] : altBg));
    doc.rect(36, y, W-72, 40, "F");

    const lines = doc.splitTextToSize(desc, 310);
    doc.setTextColor(...navy); doc.setFont("helvetica","bold"); doc.setFontSize(9);
    doc.text(lines[0], 46, y+15);
    if (lines[1]) {
      doc.setFont("helvetica","normal"); doc.setTextColor(...gray); doc.setFontSize(8);
      doc.text(lines[1], 46, y+26);
    }
    doc.setFont("helvetica","normal"); doc.setTextColor(...gray); doc.setFontSize(10);
    doc.text(String(qty), 400, y+22, {align:"center"});
    doc.text("$"+price.toFixed(2), 480, y+22, {align:"right"});
    doc.setFont("helvetica","bold"); doc.setTextColor(...navy);
    doc.text("$"+amt.toFixed(2), W-46, y+22, {align:"right"});

    doc.setDrawColor(...lgray); doc.setLineWidth(.5);
    doc.line(36, y+40, W-36, y+40);
    y += 40;
  });

  // ── TOTALS
  y += 12;
  doc.setTextColor(...gray); doc.setFont("helvetica","normal"); doc.setFontSize(10);
  doc.text("Subtotal", W-150, y, {align:"right"});
  doc.text("$"+subtotal.toFixed(2), W-46, y, {align:"right"});
  y += 16;
  doc.text("Tax", W-150, y, {align:"right"});
  doc.text("N/A", W-46, y, {align:"right"});
  y += 10;
  doc.setFillColor(...blue);
  doc.roundedRect(W-200, y, 164, 30, 4, 4, "F");
  doc.setTextColor(255,255,255); doc.setFont("helvetica","bold"); doc.setFontSize(10);
  doc.text("TOTAL DUE", W-180, y+19);
  doc.setFontSize(13);
  doc.text("$"+subtotal.toFixed(2), W-50, y+19, {align:"right"});

  // ── FOOTER
  doc.setDrawColor(...lgray); doc.setLineWidth(.5);
  doc.line(36, H-36, W-36, H-36);
  doc.setTextColor(113,128,150); doc.setFont("helvetica","normal"); doc.setFontSize(8);
  doc.text("Thank you for your business!  ·  MB Electronics  ·  Midean141@gmail.com  ·  (939) 579-1277",
    W/2, H-20, {align:"center"});

  // ── SAVE
  const slug = (document.getElementById("clientName").value||"invoice").replace(/\s+/g,"_");
  doc.save(`MB_Electronics_${slug}_${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}.pdf`);
}
</script>
</body>
</html>
